<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Sign-up Form</title>
    </head>

    <body>
        <div class="container">
            <div class="heading">
                <div>
                    <img src="odin-lined.png" alt="Odin logo">
                    <h1>ODIN</h1>
                </div>

            </div>
            <main>
                <section>
                    <p>This is not a real online service! You know you need something like this in your life to help you
                        realize your deepest dreams. Sign up now to get started.</p>
                    <p>You know you want to.</p>
                </section>
                <form id="my-form" action="" method="post">
                    <h2>Let's do this!</h2>
                    <section>
                        <p>
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" name="firstName">
                        </p>
                        <p>
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" name="lastName">
                        </p>
                    </section>
                    <section>
                        <p>
                            <label for="mail">Email</label>
                            <input type="email" id="mail" name="email">
                        </p>
                        <p>
                            <label for="phone-number">Phone Number</label>
                            <input type="tel" id="phone-number" name="phoneNumber">
                        </p>
                    </section>
                    <section>
                        <p>
                            <label for="pwd"> Password</label>
                            <input type="password" id="pwd" name="password" minlength="8"
                                pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?!.*\s).*$" required>
                        </p>
                        <p>
                            <label for="confirm-pwd">Confirm Password</label>
                            <input type="password" id="confirm-pwd" name="confirm-pwd" minlength="8"
                                pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?!.*\s).*$" required>
                        </p>
                    </section>

                </form>
                <section>
                    <p>
                        <button form="myform" type="submit">Create Account</button>
                    </p>
                    <p>Already have an account? <a href="">Log in</a></p>
                </section>
            </main>
        </div>
